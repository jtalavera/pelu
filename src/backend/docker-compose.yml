# Local SQL Server for ./gradlew bootRun (default profile). Playwright e2e uses in-memory H2 (profile e2e). Default MSSQL_SA_PASSWORD matches application.properties; create service_app_db + service_app login once if missing (see AGENTS.md).
#
# Use Azure SQL Edge on Apple Silicon: the official SQL Server 2022 image is linux/amd64-only and often segfaults under emulation (podman ps empty = container exited). Edge is JDBC-compatible for local dev.
services:
  mssql:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-The.S3cr3t.2026}"
    ports:
      - "1433:1433"
