spring.application.name=backend

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=service_app_db;encrypt=false;trustServerCertificate=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:service_app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:The.S3cr3t.2026}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# If Hibernate reports missing tables after Flyway: ensure SQL Server has service_app_db + service_app login,
# and that flyway_schema_history matches reality (e.g. if V1 was applied but tables were dropped, repair or clear history).

# Optional; Azure Container Apps sets APP_FRONTEND_URL to the Static Web App HTTPS origin for CORS.
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

app.femme.business-zone-id=${APP_FEMME_BUSINESS_ZONE:America/Asuncion}
app.femme.jwt.secret=${FEMME_JWT_SECRET:change-me-dev-only-femme-jwt-secret-min-32-chars!!}
app.femme.jwt.access-token-ttl-seconds=${FEMME_JWT_TTL_SECONDS:28800}

app.femme.email.enabled=${ACS_ENABLED:true}
app.femme.email.connection-string=${ACS_CONNECTION_STRING:}
app.femme.email.sender-address=${ACS_SENDER_ADDRESS:}
