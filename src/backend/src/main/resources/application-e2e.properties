# Playwright / local e2e: in-memory H2 with MSSQL compatibility mode.
# Same logical DB name, username and password as the default SQL Server datasource (application.properties).
# Flyway SQL migrations target SQL Server; for H2 we rely on JPA schema generation (same approach as src/test).
spring.datasource.url=jdbc:h2:mem:service_app_db;MODE=MSSQLServer;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=service_app
spring.datasource.password=The.S3cr3t.2026
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=false

# Stable JWT for local e2e runs (not for production).
app.femme.jwt.secret=e2e-jwt-secret-min-32-characters-long!!

# Disable real email sending in e2e — activation links are logged to console instead.
app.femme.email.enabled=false
