# Deploys backend (GHCR → Azure Container Apps) and frontend (Azure Static Web Apps)
# after CI succeeds on a push to main. Invoked via workflow_call from ci.yml (same commit as CI;
# avoids workflow_run + head_sha checkout, which Semgrep flags as unsafe with secrets).
# Manual runs: workflow_dispatch.
name: Deploy Azure

on:
  workflow_call:
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      GHCR_USERNAME:
        required: false
      GHCR_READ_PACKAGES_PAT:
        required: false
      AZURE_CONTAINER_APP_NAME:
        required: true
      AZURE_RESOURCE_GROUP_NAME:
        required: true
      VITE_API_BASE_URL:
        required: true
      AZURE_STATIC_WEB_APPS_API_TOKEN:
        required: true
  workflow_dispatch:

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  id-token: write
  packages: write

jobs:
  deploy:
    name: Deploy to Azure (GHCR + Container App + SWA)
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      # Same commit as the caller (push to main from CI) or the branch chosen for workflow_dispatch.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set image tag (lowercase)
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA:0:12}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME_LOWER=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: |
            src/backend/gradle/wrapper/gradle-wrapper.properties
            src/backend/build.gradle.kts
            src/backend/settings.gradle.kts

      - name: Build backend JAR
        working-directory: src/backend
        run: chmod +x gradlew && ./gradlew bootJar --no-daemon -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: src/backend
          file: src/backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME_LOWER }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME_LOWER }}:latest

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Register GHCR pull credentials on Container App
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_PACKAGES_PAT: ${{ secrets.GHCR_READ_PACKAGES_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${GHCR_READ_PACKAGES_PAT:-}" ] || [ -z "${GHCR_USERNAME:-}" ]; then
            echo "Skipping ghcr.io registry credentials (set GHCR_USERNAME + GHCR_READ_PACKAGES_PAT if the image is private)."
            echo "If pulls fail, make the package public in GitHub Packages or add these secrets."
            exit 0
          fi
          az containerapp registry set \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP_NAME }}" \
            --server ghcr.io \
            --username "$GHCR_USERNAME" \
            --password "$GHCR_READ_PACKAGES_PAT"

      - name: Deploy backend image
        run: |
          set -euo pipefail
          APP="${{ secrets.AZURE_CONTAINER_APP_NAME }}"
          RG="${{ secrets.AZURE_RESOURCE_GROUP_NAME }}"
          # Probes and env are defined in infrastructure/terraform; only the image changes here.
          az containerapp update -n "$APP" -g "$RG" \
            --image "${{ env.IMAGE_NAME_LOWER }}:${{ env.IMAGE_TAG }}"

      - name: Wait for Container App revision healthy
        run: |
          set -euo pipefail
          APP="${{ secrets.AZURE_CONTAINER_APP_NAME }}"
          RG="${{ secrets.AZURE_RESOURCE_GROUP_NAME }}"
          # Azure reports runningState as RunningAtMaxScale / RunningAtMinScale (etc.), not only "Running".
          for _ in $(seq 1 45); do
            LATEST="$(az containerapp show -n "$APP" -g "$RG" --query properties.latestRevisionName -o tsv)"
            HEALTH="$(az containerapp revision show -n "$APP" -g "$RG" --revision "$LATEST" --query properties.healthState -o tsv)"
            RUN="$(az containerapp revision show -n "$APP" -g "$RG" --revision "$LATEST" --query properties.runningState -o tsv)"
            echo "revision=$LATEST health=$HEALTH running=$RUN"
            if [ "$HEALTH" = "Healthy" ] && [[ "$RUN" == Running* ]]; then
              exit 0
            fi
            sleep 10
          done
          echo "Latest revision did not become healthy in time"
          az containerapp logs show -n "$APP" -g "$RG" --type system --tail 120
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Build frontend (production API URL)
        working-directory: src/frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm ci && npm run build

      # Avoid Azure/static-web-apps-deploy@v1: it runs as a Docker action FROM
      # mcr.microsoft.com/appsvc/staticappsclient:stable, which often returns 403
      # from GitHub-hosted runners (MCR WAF / IP policy). SWA CLI deploys from Node
      # and fetches the StaticSitesClient binary from Azure CDN instead.
      - name: Deploy Static Web App
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: npx --yes @azure/static-web-apps-cli@2 deploy src/frontend/dist --env production --no-use-keychain
