# Deploys the v2 infrastructure targets alongside the existing v1 pipeline (ci.yml).
# Triggers:
#   develop → v2-test environment (subscription 677a6eab…)
#   main    → v2-production environment (subscription 9e394b80…)
#
# ci.yml continues deploying to v1 on push to main — both run in parallel during migration.
# Once v2 is validated, remove the v1 deploy job from ci.yml.
name: Deploy v2

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target v2 environment"
        required: true
        type: choice
        options:
          - v2-test
          - v2-production

concurrency:
  group: deploy-v2-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  id-token: write
  packages: write

jobs:
  frontend:
    name: Frontend (lint, audit, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Dependency vulnerability check (npm audit)
        run: npm audit --audit-level=high

      - name: Unit tests
        run: npm run test

      - name: Build artifacts
        run: npm run build

  backend:
    name: Backend (lint, audit, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: |
            src/backend/gradle/wrapper/gradle-wrapper.properties
            src/backend/build.gradle.kts
            src/backend/settings.gradle.kts

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Lint (Spotless)
        run: ./gradlew spotlessCheck

      - name: Unit tests
        run: ./gradlew test

      - name: Build artifacts
        run: ./gradlew bootJar

      - name: Dependency vulnerability check (Trivy on JAR)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scan-ref: src/backend/build/libs
          severity: CRITICAL,HIGH
          exit-code: "1"

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install --no-cache-dir semgrep

      - name: Run Semgrep
        run: semgrep scan --config auto --error

  # Deploys to v2-test on push to develop.
  # Secrets are resolved from the 'v2-test' GitHub Environment.
  deploy-test:
    name: Deploy to v2-test
    needs: [frontend, backend, sast]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: v2-test
    permissions:
      contents: read
      actions: read
      id-token: write
      packages: write
    uses: ./.github/workflows/deploy-azure.yml
    secrets: inherit

  # Deploys to v2-production on push to main (runs alongside the v1 ci.yml deploy during migration).
  # Secrets are resolved from the 'v2-production' GitHub Environment.
  deploy-prod:
    name: Deploy to v2-production
    needs: [frontend, backend, sast]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: v2-production
    permissions:
      contents: read
      actions: read
      id-token: write
      packages: write
    uses: ./.github/workflows/deploy-azure.yml
    secrets: inherit

  # Manual dispatch: deploy to whichever environment was chosen.
  deploy-manual:
    name: Deploy (manual dispatch)
    needs: [frontend, backend, sast]
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      actions: read
      id-token: write
      packages: write
    uses: ./.github/workflows/deploy-azure.yml
    secrets: inherit
